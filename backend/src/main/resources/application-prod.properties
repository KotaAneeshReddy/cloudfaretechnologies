spring.application.name=cloudfare

# --- Database (Production Settings) ---
# Use the specific user we created, not root
spring.datasource.url=jdbc:mysql://localhost:3306/cloudfare?useSSL=false&serverTimezone=UTC
spring.datasource.username=java_user
spring.datasource.password=Chaitu@123

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- File Upload ---
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB

# --- Email (Keep as is, but consider using Environment Variables later) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=info@cloudfaretechnologies.com
spring.mail.password=Cloudfare@123
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true